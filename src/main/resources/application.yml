spring:
  profiles:
    active: dev
  
  # H2 메모리 DB 설정 (대용량 벌크 인서트 테스트에 적합)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console

  # 1) 파일 업로드/다운로드 크기 제한 옵션 (Spring 기본 설정)
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB      # 개별 파일당 최대 크기 제한
      max-request-size: 50MB   # 전체 요청당 최대 크기 제한
      resolve-lazily: true

# 커스텀 모듈 설정 (보안 필터 및 디렉토리)
app:
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100
    thread-name-prefix: "FileProcExecutor-"
  file:
    temp-dir: "D:/projectRepo/file-processor/temp"
    temp-task-dir: "D:/projectRepo/file-processor/temp/task"
    categories:
      image: "D:/projectRepo/file-processor/uploads/images"
      template: "D:/projectRepo/file-processor/uploads/templates"
      text: "D:/projectRepo/file-processor/uploads/texts"
      document: "D:/projectRepo/file-processor/uploads/documents"
  security:
    file:
      max-limit-bytes: 52428800
      whitelist:
        image: "^(jpg|jpeg|png|gif|bmp|webp|svg)$"
        template: "^(html|htm|email|tpl)$"
        text: "^(txt|log)$"
        document: "^(csv|xls|xlsx|json|pdf|doc|docx|ppt|pptx|zip)$"
      blacklist:
        binary: "^(jar|exe|dll|sys|so|bin|war|class)$"
        script: "^(bat|cmd|sh|bash|ps1|vbs|js|jse|wsf|scr|msi|reg|lnk|py|php|jsp|asp|aspx)$"
      tasklist:
        line-demeter: "^(txt|csv|xls|xlsx|csv)$"
        json-parser: "^(txt|json)$"
logging:
  level:
    root: INFO
    com.fileprocessor: DEBUG
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
